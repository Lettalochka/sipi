<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legal Store - Checkout</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #0f172a;
      background: #f4f7fb;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px;
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .step {
      border: 1px solid #dbe7ee;
      border-radius: 16px;
      padding: 22px;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .08);
    }

    .step strong {
      display: grid;
      width: 38px;
      height: 38px;
      margin-bottom: 16px;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: #0b4a6f;
    }

    .button {
      margin-top: 24px;
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      color: #ffffff;
      background: #0b4a6f;
      font-weight: 900;
    }

    @media (max-width: 760px) {
      .flow {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Оформление заказа</h1>
    <section class="flow">
      <div class="step"><strong>1</strong><h2>Choose</h2><p>Пользователь выбирает цифровой товар.</p></div>
      <div class="step"><strong>2</strong><h2>Pay</h2><p>Переход к оплате через Digiseller.</p></div>
      <div class="step"><strong>3</strong><h2>Receive</h2><p>Ключ доступен после подтверждения оплаты.</p></div>
    </section>
    <button class="button">Pay with Digiseller</button>
  </main>
</body>
</html>
