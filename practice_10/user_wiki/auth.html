<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legal Store - Auth</title>
  <style>
    body {
      margin: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #0f172a;
      background: #eef6f8;
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid #dbe7ee;
      border-radius: 18px;
      padding: 28px;
      background: #ffffff;
      box-shadow: 0 18px 44px rgba(15, 23, 42, .1);
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #64748b;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #dbe7ee;
      border-radius: 10px;
      padding: 12px;
      font: inherit;
    }

    .button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      color: #ffffff;
      background: #0b4a6f;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <form class="card">
    <h1>Вход</h1>
    <label>Email</label>
    <input type="email" placeholder="user@example.com">
    <label>Password</label>
    <input type="password" placeholder="password">
    <button class="button">Log in</button>
  </form>
</body>
</html>
